name: Deploy
run-name: Deploy from ${{ github.event_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ main ]

jobs:
  Build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v6

      - name: Docker login
        run: docker login -u vtsv -p $DOCKER_TOKEN
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

      - name: Build images
        run: docker compose build challenge

      - name: Push images
        run: docker compose push challenge

  Deploy:
    runs-on: ubuntu-latest
    needs: Build
    environment: Production
    env:
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v6

      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Add SSH key
        run: echo "$SSH_KEY" > ~/.ssh/id_rsa
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set SSH key permissions
        run: chmod 600 ~/.ssh/id_rsa

      - name: Add SSH host keys
        run: ssh-keyscan challenge.fingerlakesrunners.org > ~/.ssh/known_hosts

      - name: Deploy latest compose configuration
        run: scp docker-compose.yml root@challenge.fingerlakesrunners.org:/var/leaderboards

      - name: Pull images
        run: ssh root@challenge.fingerlakesrunners.org "cd /var/leaderboards && docker compose pull"

      - name: Run images
        run: ssh root@challenge.fingerlakesrunners.org "cd /var/leaderboards && docker compose up -d"