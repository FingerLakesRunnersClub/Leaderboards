services:
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - data:/var/lib/postgresql/18/docker
    restart: always
  challenge:
    image: ecoapm/flrc-leaderboards
    build:
      context: .
    command: "Challenge"
    env_file:
      - .env
    ports:
      - "5001:8080"
    restart: always
  trail-circuit:
    image: ecoapm/flrc-leaderboards
    build:
      context: .
    command: "TrailCircuit"
    env_file:
      - .env
    ports:
      - "5002:8080"
    restart: always
  track:
    image: ecoapm/flrc-leaderboards
    build:
      context: .
    command: "Track"
    env_file:
      - .env
    ports:
      - "5003:8080"
    restart: always
    volumes:
      - "../TrackResults:/TrackResults"

volumes:
  data: